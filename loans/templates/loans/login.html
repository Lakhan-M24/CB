<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Cartoons Boys</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f14;--surface:#151820;--surface2:#1c2030;--border:rgba(255,255,255,0.1);--text:#e8eaf0;--muted:#7a7f94;--accent:#f0b429;--red:#f87171;--font:'Syne',sans-serif;--mono:'DM Mono',monospace}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font);display:flex;align-items:center;justify-content:center}
.login-wrap{width:100%;max-width:380px;padding:1rem}
.login-logo{text-align:center;margin-bottom:2rem}
.login-logo h1{font-size:1.5rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.login-logo span{color:var(--accent)}
.login-logo p{font-size:12px;color:var(--muted);margin-top:4px;font-family:var(--mono)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2rem}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:1.2rem}
label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
input{background:var(--surface2);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:var(--text);font-family:var(--font);font-size:14px;padding:10px 14px;outline:none;transition:border-color .2s;width:100%}
input:focus{border-color:var(--accent)}
.btn{width:100%;background:var(--accent);color:#0d0f14;font-family:var(--font);font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:11px;border:none;border-radius:8px;cursor:pointer;transition:background .15s;margin-top:.5rem}
.btn:hover{background:#e0a520}
.error{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--red);padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:1rem}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <h1>Cartoons <span>Boys</span></h1>
    <p>Loan Management System</p>
  </div>
  <div class="card">
    {% if messages %}{% for msg in messages %}<div class="error">{{ msg }}</div>{% endfor %}{% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" autofocus required placeholder="Enter username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="Enter password">
      </div>
      <button type="submit" class="btn">Login</button>
    </form>
  </div>
</div>
</body>
</html>
