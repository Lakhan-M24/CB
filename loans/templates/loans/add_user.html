{% extends 'loans/base.html' %}
{% block title %}Add User{% endblock %}
{% block content %}
<div style="max-width:500px;margin:0 auto">
  <div class="card">
    <div class="card-title">+ <span>Add</span> New User</div>
    <form method="post">
      {% csrf_token %}
      <div class="form-group" style="margin-bottom:1.2rem">
        <label>Username *</label>
        <input class="form-control" type="text" name="username" required>
      </div>
      <div class="form-group" style="margin-bottom:1.2rem">
        <label>First Name</label>
        <input class="form-control" type="text" name="first_name">
      </div>
      <div class="form-group" style="margin-bottom:1.2rem">
        <label>Last Name</label>
        <input class="form-control" type="text" name="last_name">
      </div>
      <div class="form-group" style="margin-bottom:1.2rem">
        <label>Password *</label>
        <input class="form-control" type="password" name="password" required>
      </div>
      <div class="form-group" style="margin-bottom:1.5rem;flex-direction:row;align-items:center;gap:10px">
        <input type="checkbox" name="is_staff" id="is_staff" style="width:16px;height:16px">
        <label for="is_staff" style="text-transform:none;font-size:13px;letter-spacing:0;cursor:pointer">Grant Admin access (can add/edit/delete loans)</label>
      </div>
      <div class="form-actions">
        <a href="{% url 'manage_users' %}" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary">Create User</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
