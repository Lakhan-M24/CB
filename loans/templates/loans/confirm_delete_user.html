{% extends 'loans/base.html' %}
{% block title %}Delete User{% endblock %}
{% block content %}
<div class="confirm-box">
  <div class="card">
    <div class="warn">⚠</div>
    <div class="card-title">Delete user <span>{{ target_user.username }}</span>?</div>
    <p style="color:var(--muted);font-size:13px;margin-bottom:1.5rem">This will permanently remove this user account.</p>
    <form method="post">
      {% csrf_token %}
      <div class="form-actions">
        <a href="{% url 'manage_users' %}" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
